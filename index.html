<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Acecent 🚀</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/acecent/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/acecent/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/acecent/favicon/favicon-16x16.png">
  <link rel="manifest" href="/acecent/favicon/site.webmanifest">
  <meta name="theme-color" content="#f5c518">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <button id="floating-help-btn" class="floating-help-btn" title="How to Play">ℹ️</button>
  <div id="app"></div>
  <script type="module">
    import { GameState, PHASES } from './js/game.js';
    import { renderNameEntry, renderHand, renderLaunchSequence, playRocketAnimation } from './js/ui.js';
    import { showReadme, shouldShow, isVersionBump } from './js/readme.js';
    import { initFirebase, submitScore } from './js/firebase.js';
    import { renderLeaderboard } from './js/leaderboard.js';

    initFirebase();

    // Version mismatch check — prompt cache refresh
    const LS_LIVE_VERSION = 'acecent_live_version';
    import('./js/config.js').then(({ VERSION }) => {
      const cachedVersion = localStorage.getItem(LS_LIVE_VERSION);
      if (cachedVersion && cachedVersion !== VERSION) {
        const banner = document.createElement('div');
        banner.className = 'update-banner';
        banner.innerHTML = `
          🚀 New version available (v${VERSION})
          <button class="update-btn" id="update-btn">Refresh now</button>
        `;
        document.body.prepend(banner);
        document.getElementById('update-btn').addEventListener('click', () => {
          localStorage.setItem(LS_LIVE_VERSION, VERSION);
          window.location.reload(true);
        });
      } else {
        localStorage.setItem(LS_LIVE_VERSION, VERSION);
      }
    });

    // Floating help button — always accessible
    document.getElementById('floating-help-btn').addEventListener('click', () => showReadme(false));

    const app = document.getElementById('app');
    const gs = new GameState();

    function render() {
      if (gs.phase === PHASES.NAME_ENTRY) {
        // Check if already played today
        const existing = gs.loadTodayResult();
        if (existing) {
          showAlreadyPlayed(existing);
          return;
        }
        renderNameEntry(app, gs, () => {
          gs.startGame();
          render();
        });
      } else if (gs.phase === PHASES.HAND) {
        renderHand(app, gs,
          () => { gs.doRedraw(); render(); },
          () => { gs.doLaunch(); }
        );
      }
    }

    function showAlreadyPlayed(result) {
      app.innerHTML = `
        <div class="screen already-played-screen">
          <div class="title-block">
            <div class="title-emoji">🚀</div>
            <h1 class="game-title">Project Acecent</h1>
          </div>
          <div class="already-card">
            <p class="already-label">TODAY'S FLIGHT</p>
            <div class="result-tier-emoji">${result.tier.emoji}</div>
            <div class="result-tier-name">${result.tier.name}</div>
            <div class="result-altitude">${result.altitude.toLocaleString()} ft</div>
            <div class="result-pilot">👤 ${result.playerName}</div>
          </div>
          <button id="share-again-btn" class="btn-primary" style="margin-top:2rem">
            📋 Copy Share Card
          </button>
          <button id="leaderboard-again-btn" class="btn-secondary">
            📡 View Leaderboard
          </button>
          <div id="share-confirm-2" class="share-confirm" style="display:none">✅ Copied!</div>
          <p class="come-back">Come back tomorrow for a new mission! 🌙</p>
          <div class="scoreboard-notice">📡 Daily Leaderboard — Live</div>
        </div>
      `;

      import('./js/share.js').then(({ copyShareCard }) => {
        document.getElementById('share-again-btn').addEventListener('click', async () => {
          const { success } = await copyShareCard(result);
          const el = document.getElementById('share-confirm-2');
          el.style.display = 'block';
          el.textContent = success ? '✅ Copied!' : '📋 Copy failed';
          setTimeout(() => { el.style.display = 'none'; }, 2000);
        });
      });

      document.getElementById('leaderboard-again-btn').addEventListener('click', () => {
        renderLeaderboard(app, result.playerName, result.altitude, () => showAlreadyPlayed(result));
      });
    }

    // Listen for launch complete
    gs.on('launchComplete', (result) => {
      submitScore(gs.playerName, result.altitude, result.tier.name);

      playRocketAnimation(app, () => {
        const showResult = () => renderLaunchSequence(app, result, gs, () => {
          renderLeaderboard(app, gs.playerName, result.altitude, () => showResult());
        });
        showResult();
      });
    });

    // Listen for redraw bonuses
    gs.on('redrawBonus', ({ message }) => {
      showToast(message);
    });

    function showToast(msg) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.classList.add('toast-visible'), 10);
      setTimeout(() => {
        toast.classList.remove('toast-visible');
        setTimeout(() => document.body.removeChild(toast), 400);
      }, 2500);
    }

    render();

    // Show readme on first load or version bump
    if (shouldShow()) {
      setTimeout(() => showReadme(isVersionBump()), 400);
    }
  </script>
</body>
</html>
