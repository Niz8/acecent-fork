<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Acecent 🚀</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/acecent/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/acecent/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/acecent/favicon/favicon-16x16.png">
  <link rel="manifest" href="/acecent/favicon/site.webmanifest">
  <meta name="theme-color" content="#f5c518">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #0a0a1a;
      color: #e8e8f0;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .container { padding: 2rem; max-width: 400px; }
    .rocket {
      font-size: 4rem;
      animation: float 3s ease-in-out infinite;
      display: block;
      margin-bottom: 1.5rem;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    h1 {
      font-size: 1.8rem;
      color: #f5c518;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #6666aa;
      letter-spacing: 0.08em;
      margin-bottom: 2rem;
    }
    .status {
      font-size: 0.8rem;
      color: #8888cc;
      line-height: 1.8;
      border: 1px solid #1a1a3a;
      border-radius: 6px;
      padding: 1rem 1.25rem;
      background: #0d0d20;
    }
    .status span { color: #f5c518; }
    .footer {
      margin-top: 2rem;
      font-size: 0.62rem;
      color: #2a2a4a;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="rocket">🚀</span>
    <h1>Project Acecent</h1>
    <p class="subtitle">Five cards. One shot. How high can you go?</p>
    <div class="status">
      <span>🔧 Under Maintenance</span><br>
      We are fixing a bug and will be back shortly.<br>
      Check back soon for launch!
    </div>
    <p class="footer">v0.6.7-alpha · vibe coded · use at your own risk</p>
  </div>
</body>
</html>
