<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Acecent 🚀</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/acecent/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/acecent/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/acecent/favicon/favicon-16x16.png">
  <link rel="manifest" href="/acecent/favicon/site.webmanifest">
  <meta name="theme-color" content="#b22234">
  <link rel="stylesheet" href="style.css" />
  <style>
    /* 4th of July — remove this block when reverting */
    #fireworks-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9999;
    }
    #jul4-banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      text-align: center;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      padding: 0.3rem;
      background: #0a0a1a;
      color: #b22234;
      z-index: 100;
      pointer-events: none;
    }
    body { padding-top: 1.4rem; }
  </style>
</head>
<body>
  <!-- 4th of July — remove these two elements when reverting -->
  <div id="jul4-banner">🎆 HAPPY 4TH OF JULY 🎆</div>
  <canvas id="fireworks-canvas"></canvas>

  <button id="floating-help-btn" class="floating-help-btn" title="How to Play">ℹ️</button>
  <div id="app"></div>

  <script type="module">
    import { GameState, PHASES } from './js/game.js';
    import { renderNameEntry, renderHand, renderLaunchSequence, playRocketAnimation } from './js/ui.js';
    import { showReadme, shouldShow, isVersionBump } from './js/readme.js';
    import { initFirebase, submitScore } from './js/firebase.js';
    import { renderLeaderboard } from './js/leaderboard.js';

    initFirebase();

    const LS_LIVE_VERSION = 'acecent_live_version';
    import('./js/config.js').then(({ VERSION }) => {
      const cachedVersion = localStorage.getItem(LS_LIVE_VERSION);
      if (cachedVersion && cachedVersion !== VERSION) {
        const banner = document.createElement('div');
        banner.className = 'update-banner';
        banner.innerHTML = `
          🚀 New version available (v${VERSION})
          <button class="update-btn" id="update-btn">Refresh now</button>
        `;
        document.body.prepend(banner);
        document.getElementById('update-btn').addEventListener('click', () => {
          localStorage.setItem(LS_LIVE_VERSION, VERSION);
          window.location.reload(true);
        });
      } else {
        localStorage.setItem(LS_LIVE_VERSION, VERSION);
      }
    });

    document.getElementById('floating-help-btn').addEventListener('click', () => showReadme(false));

    const app = document.getElementById('app');
    const gs = new GameState();

    function render() {
      if (gs.phase === PHASES.NAME_ENTRY) {
        const existing = gs.loadTodayResult();
        if (existing) {
          showAlreadyPlayed(existing);
          return;
        }
        renderNameEntry(app, gs, () => {
          gs.startGame();
          render();
        });
      } else if (gs.phase === PHASES.HAND) {
        renderHand(app, gs,
          () => { gs.doRedraw(); render(); },
          () => { gs.doLaunch(); }
        );
      }
    }

    function showAlreadyPlayed(result) {
      app.innerHTML = `
        <div class="screen already-played-screen">
          <div class="title-block">
            <div class="title-emoji">🚀</div>
            <h1 class="game-title">Project Acecent</h1>
          </div>
          <div class="already-card">
            <p class="already-label">TODAY'S FLIGHT</p>
            <div class="result-tier-emoji">${result.tier.emoji}</div>
            <div class="result-tier-name">${result.tier.name}</div>
            <div class="result-altitude">${result.altitude.toLocaleString()} ft</div>
            <div class="result-pilot">👤 ${result.playerName}</div>
          </div>
          <button id="share-again-btn" class="btn-primary" style="margin-top:2rem">
            📋 Copy Share Card
          </button>
          <button id="leaderboard-again-btn" class="btn-secondary">
            📡 View Leaderboard
          </button>
          <div id="share-confirm-2" class="share-confirm" style="display:none">✅ Copied!</div>
          <p class="come-back">Come back tomorrow for a new mission! 🌙</p>
          <div class="scoreboard-notice">📡 Daily Leaderboard — Live</div>
        </div>
      `;

      import('./js/share.js').then(({ copyShareCard }) => {
        document.getElementById('share-again-btn').addEventListener('click', async () => {
          const { success } = await copyShareCard(result);
          const el = document.getElementById('share-confirm-2');
          el.style.display = 'block';
          el.textContent = success ? '✅ Copied!' : '📋 Copy failed';
          setTimeout(() => { el.style.display = 'none'; }, 2000);
        });
      });

      document.getElementById('leaderboard-again-btn').addEventListener('click', () => {
        renderLeaderboard(app, result.playerName, result.altitude, () => showAlreadyPlayed(result));
      });
    }

    // 4th of July — firecracker launch override
    function playFirecrackerAnimation(container, onComplete) {
      container.innerHTML = `
        <div class="screen launch-animation-screen">
          <div class="launch-bg">
            <div class="stars" id="stars"></div>
            <div class="rocket-wrapper" id="rocket-wrapper">
              <div class="rocket-ship">&#x1F9E8;</div>
              <div class="exhaust">&#x1F525;</div>
            </div>
            <div class="launch-text" id="launch-text">T-MINUS ZERO</div>
            <div id="burst-container" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;"></div>
          </div>
        </div>
      `;

      const stars = container.querySelector('#stars');
      for (let i = 0; i < 60; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = (Math.random() * 2) + 's';
        stars.appendChild(star);
      }

      const rocketWrapper = container.querySelector('#rocket-wrapper');
      const launchText = container.querySelector('#launch-text');
      const burstContainer = container.querySelector('#burst-container');

      const BURST_COLORS = ['#ff4444','#ff6666','#ffffff','#4444cc','#6688ff','#f5c518','#ffaaaa','#aabbff'];

      function spawnBurst() {
        const rect = rocketWrapper.getBoundingClientRect();
        const cRect = burstContainer.getBoundingClientRect();
        const cx = rect.left - cRect.left + rect.width / 2;
        const cy = rect.top - cRect.top + rect.height / 2;
        for (let i = 0; i < 28; i++) {
          const p = document.createElement('div');
          const angle = (Math.PI * 2 * i) / 28;
          const dist = 50 + Math.random() * 70;
          const color = BURST_COLORS[Math.floor(Math.random() * BURST_COLORS.length)];
          const size = 6 + Math.random() * 6;
          p.style.cssText = `position:absolute;left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;border-radius:50%;background:${color};transition:transform 0.65s ease-out,opacity 0.65s ease-out;opacity:1;`;
          burstContainer.appendChild(p);
          requestAnimationFrame(() => {
            p.style.transform = `translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px)`;
            p.style.opacity = '0';
          });
          setTimeout(() => p.remove(), 700);
        }
      }

      setTimeout(() => { launchText.textContent = 'IGNITION'; }, 300);
      setTimeout(() => { launchText.textContent = '&#x1F525;&#x1F525;&#x1F525;'; }, 800);
      setTimeout(() => {
        rocketWrapper.classList.add('hop');
        launchText.textContent = '&#x1F9E8;&#x1F4A5;';
        spawnBurst();
      }, 1200);
      setTimeout(() => { onComplete(); }, 2400);
    }

    gs.on('launchComplete', (result) => {
      submitScore(gs.playerName, result.altitude, result.tier.name);
      playFirecrackerAnimation(app, () => {
        const showResult = () => renderLaunchSequence(app, result, gs, () => {
          renderLeaderboard(app, gs.playerName, result.altitude, () => showResult());
        });
        showResult();
      });
    });

    gs.on('redrawBonus', ({ message }) => {
      showToast(message);
    });

    function showToast(msg) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.classList.add('toast-visible'), 10);
      setTimeout(() => {
        toast.classList.remove('toast-visible');
        setTimeout(() => document.body.removeChild(toast), 400);
      }, 2500);
    }

    render();

    if (shouldShow()) {
      setTimeout(() => showReadme(isVersionBump()), 400);
    }
  </script>

  <!-- 4th of July fireworks — remove this script block when reverting -->
  <script>
    (function () {
      const canvas = document.getElementById('fireworks-canvas');
      const ctx = canvas.getContext('2d');

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      const COLORS = [
        '#ff4444', '#ff6666', '#ffaaaa',
        '#ffffff', '#ddddff',
        '#4444cc', '#6688ff', '#aabbff',
        '#f5c518',
      ];

      const particles = [];
      const rockets = [];

      function randomColor() {
        return COLORS[Math.floor(Math.random() * COLORS.length)];
      }

      function launchRocket() {
        rockets.push({
          x: canvas.width * (0.15 + Math.random() * 0.7),
          y: canvas.height,
          vy: -(8 + Math.random() * 6),
          targetY: canvas.height * (0.1 + Math.random() * 0.4),
          color: randomColor(),
        });
      }

      function explode(x, y, color) {
        const count = 60 + Math.floor(Math.random() * 40);
        for (let i = 0; i < count; i++) {
          const angle = (Math.PI * 2 * i) / count;
          const speed = 1.5 + Math.random() * 3;
          particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            alpha: 1,
            color,
            radius: 1.5 + Math.random() * 1.5,
          });
        }
      }

      let lastLaunch = 0;
      function tick(ts) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (ts - lastLaunch > 1200 + Math.random() * 800) {
          launchRocket();
          lastLaunch = ts;
        }

        for (let i = rockets.length - 1; i >= 0; i--) {
          const r = rockets[i];
          r.y += r.vy;
          ctx.beginPath();
          ctx.arc(r.x, r.y, 2, 0, Math.PI * 2);
          ctx.fillStyle = r.color;
          ctx.fill();
          if (r.y <= r.targetY) {
            explode(r.x, r.y, r.color);
            rockets.splice(i, 1);
          }
        }

        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.06;
          p.alpha -= 0.018;
          if (p.alpha <= 0) { particles.splice(i, 1); continue; }
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.alpha;
          ctx.fill();
          ctx.globalAlpha = 1;
        }

        requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
